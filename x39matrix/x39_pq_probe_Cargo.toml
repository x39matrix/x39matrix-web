[package]
name = "x39_pq_probe"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
fips204 = { version = "0.4", default-features = false, features = ["ml-dsa-87"] }
ic-cdk = "0.17"
candid = "0.10"
serde = { version = "1.0", features = ["derive"] }
rand_core = { version = "0.6", default-features = false }
sha2 = { version = "0.10", default-features = false }
